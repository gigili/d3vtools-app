name: Release desktop artifacts

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release notes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.notes.outputs.version }}
    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Extract changelog section
        id: notes
        shell: bash
        run: |
          node scripts/release-notes.mjs --output release-notes.md
          version=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          test "$version" = "$tag" || { echo "Release tag $GITHUB_REF_NAME does not match package.json version $version"; exit 1; }

      - name: Update GitHub release description
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --title "D3vTools ${{ steps.notes.outputs.version }}" --notes-file release-notes.md

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: --linux deb AppImage snap
            artifacts: |
              dist/*.deb
              dist/*.AppImage
              dist/*.snap
          - name: Windows
            os: windows-latest
            target: --win nsis
            artifacts: dist/*.exe
          - name: macOS
            os: macos-latest
            target: --mac dmg
            artifacts: dist/*.dmg
    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev pkg-config build-essential
          sudo snap install snapcraft --classic

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package application
        shell: bash
        run: npx --no-install electron-builder ${{ matrix.target }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: d3vtools-${{ matrix.name }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  upload:
    name: Upload release artifacts
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: d3vtools-*
          path: release-assets
          merge-multiple: true

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
